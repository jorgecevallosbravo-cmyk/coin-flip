
<style>
.coin-scene{perspective:800px;width:160px;height:160px;margin:0 auto 1.75rem}
.coin{width:160px;height:160px;position:relative;transform-style:preserve-3d;transform:rotateY(0deg)}
.coin.flip-a{animation:flipToA 2.7s ease-in-out forwards}
.coin.flip-b{animation:flipToB 2.7s ease-in-out forwards}
.coin-face,.coin-back{position:absolute;inset:0;border-radius:50%;backface-visibility:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;border:5px solid #BA7517;background:#FAEEDA}
.coin-back{transform:rotateY(180deg)}
@keyframes flipToA{0%{transform:rotateY(0deg)}100%{transform:rotateY(1440deg)}}
@keyframes flipToB{0%{transform:rotateY(0deg)}100%{transform:rotateY(1620deg)}}
.ni{width:100%;padding:10px 14px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:14px;background:var(--color-background-primary);color:var(--color-text-primary);outline:none;font-family:var(--font-sans)}
.ni:focus{border-color:#BA7517;box-shadow:0 0 0 2px rgba(186,117,23,.18)}
.fb{background:#BA7517;border:none;border-radius:var(--border-radius-md);padding:12px 32px;color:#FAEEDA;font-size:15px;font-weight:500;cursor:pointer;font-family:var(--font-sans)}
.fb:hover{opacity:.85}.fb:active{transform:scale(.98)}
.sb{background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);padding:10px 24px;color:var(--color-text-primary);font-size:14px;cursor:pointer;font-family:var(--font-sans)}
.sb:hover{background:var(--color-background-secondary)}
.pt{height:8px;background:var(--color-background-secondary);border-radius:4px;overflow:hidden}
.pf{height:100%;border-radius:4px;transition:width .5s ease}
</style>

<div id="root" style="max-width:480px;margin:0 auto;padding:2rem 1rem"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useRef}=React;

const ROSTER=[
  {id:"angie.alcivarc.0122@espam.edu.ec",label:"Alcivar Castro Angie Jomaira"},
  {id:"milena.alcivar.0122@espam.edu.ec",label:"Alcivar Murillo Milena Marilu"},
  {id:"willians.arteaga.0121@espam.edu.ec",label:"Arteaga Medranda Willians Vicente"},
  {id:"yajaira.bailon.0124@espam.edu.ec",label:"Bailon Vera Yajaira Lisseth"},
  {id:"sandra.baldeon.0124@espam.edu.ec",label:"Baldeon Brito Sandra Elena"},
  {id:"andrea.basurto.0223@espam.edu.ec",label:"Basurto Zambrano Andrea Moncerrate"},
  {id:"sara.bravo.0122@espam.edu.ec",label:"Bravo Quintero Sara Nicole"},
  {id:"leyly.brito.0222@espam.edu.ec",label:"Brito Vega Leyly Koreima"},
  {id:"andrea.caicedo.0123@espam.edu.ec",label:"Caicedo Veliz Andrea Damaris"},
  {id:"maria.carranza.0223@espam.edu.ec",label:"Carranza Avalos Maria Auxiliadora"},
  {id:"divina.centeno.0222@espam.edu.ec",label:"Centeno Mendieta Divina Valentina"},
  {id:"maria.cusmes.0122@espam.edu.ec",label:"Cusme Sacon Maria Mercedes"},
  {id:"julexy.ganchozo.0222@espam.edu.ec",label:"Ganchozo Bravo Julexy Nicolle"},
  {id:"hernan.guanuche.0123@espam.edu.ec",label:"Guanuche Montero Hernan Ismael"},
  {id:"daniela.guerrero.0122@espam.edu.ec",label:"Guerrero Alcivar Daniela Dolores"},
  {id:"andrea.macas.0124@espam.edu.ec",label:"Macas Aguilar Andrea Elizabeth"},
  {id:"maria.macias.0221@espam.edu.ec",label:"Macias Pincay Maria Nicole"},
  {id:"milena.mejia.0122@espam.edu.ec",label:"Mejia Pincay Milena Dayana"},
  {id:"jorge.mendoza.0124@espam.edu.ec",label:"Mendoza Loor Jorge Alberto"},
  {id:"juan.molina.0122@espam.edu.ec",label:"Molina Andrade Juan Mathias"},
  {id:"edgar.montaguano.0124@espam.edu.ec",label:"Montaguano Viscaino Edgar Antonio"},
  {id:"gabriela.mora.41@espam.edu.ec",label:"Mora Manzaba Gabriela Monserrate"},
  {id:"maria.moreno.0123@espam.edu.ec",label:"Moreno Cedeno Maria Mercedes"},
  {id:"kennia.ormaza.0222@espam.edu.ec",label:"Ormaza Lopez Kennia Anahi"},
  {id:"maria.parragav.0222@espam.edu.ec",label:"Parraga Vidal Maria Teresa"},
  {id:"juliana.quiroz.0122@espam.edu.ec",label:"Quiroz Barre Juliana Katherine"},
  {id:"antony.solorzano.0124@espam.edu.ec",label:"Solorzano Alava Antony Daniel"},
  {id:"gema.solorzano.0122@espam.edu.ec",label:"Solorzano Basurto Gema Lucia"},
  {id:"juan.solorzano.0123@espam.edu.ec",label:"Solorzano Miranda Juan Adonis"},
  {id:"roberto.valverde.0124@espam.edu.ec",label:"Valverde Verduga Roberto Jossue"},
  {id:"lourdes.vera.0222@espam.edu.ec",label:"Vera Quijije Lourdes Jazmina"},
  {id:"joao.vinces.0222@espam.edu.ec",label:"Vinces Loor Joao Javier"},
  {id:"damaris.zambrano.4924@espam.edu.ec",label:"Zambrano Buste Damaris Abigail"},
  {id:"gema.zambranog.41@espam.edu.ec",label:"Zambrano Ganchozo Gema Geniffer"},
  {id:"juleysy.zambrano.0222@espam.edu.ec",label:"Zambrano Giler Juleysy Jamileth"},
];

function normalize(s){
  return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z\s]/g,"").trim();
}

function findMatch(typed){
  const words=normalize(typed).split(/\s+/).filter(Boolean);
  if(words.length<2) return [];
  return ROSTER.filter(s=>words.every(w=>normalize(s.label).includes(w)));
}

function App(){
  const[typed,setTyped]=useState("");
  const[phase,setPhase]=useState("type");
  const[selected,setSelected]=useState(null);
  const[result,setResult]=useState(null);
  const[votes,setVotes]=useState({});
  const[loading,setLoading]=useState(true);
  const[flipKey,setFlipKey]=useState(0);
  const[matches,setMatches]=useState([]);
  const inputRef=useRef();

  useEffect(()=>{
    (async()=>{
      try{const r=await window.storage.get("cf_votes3",true);setVotes(r?.value?JSON.parse(r.value):{});}catch{}
      setLoading(false);
    })();
  },[]);

  const tally=Object.values(votes).reduce((a,v)=>{a[v]=(a[v]||0)+1;return a},{A:0,B:0});
  const total=tally.A+tally.B;
  const pctA=total>0?Math.round(tally.A/total*100):50;
  const pctB=100-pctA;

  const handleVerify=()=>{
    const found=findMatch(typed);
    if(found.length===0){setPhase("notfound");return;}
    if(found.length>1){setMatches(found);setPhase("ambiguous");return;}
    const s=found[0];
    setSelected(s);
    if(votes[s.id]!==undefined){setResult(votes[s.id]);setPhase("already");}
    else{setPhase("confirm");}
  };

  const confirmStudent=(s)=>{
    setSelected(s);
    if(votes[s.id]!==undefined){setResult(votes[s.id]);setPhase("already");}
    else setPhase("confirm");
  };

  const doFlip=()=>{
    const choice=Math.random()<.5?"A":"B";
    setResult(choice);setFlipKey(k=>k+1);setPhase("flipping");
    setTimeout(async()=>{
      setPhase("done");
      try{
        const r=await window.storage.get("cf_votes3",true);
        const cur=r?.value?JSON.parse(r.value):{};
        cur[selected.id]=choice;
        await window.storage.set("cf_votes3",JSON.stringify(cur),true);
        setVotes(cur);
      }catch{setVotes(v=>({...v,[selected.id]:choice}));}
    },2800);
  };

  let coinCls="coin";let coinSt={};
  if(phase==="flipping"||phase==="done") coinCls=`coin flip-${result?.toLowerCase()}`;
  else if(phase==="already") coinSt={transform:result==="B"?"rotateY(180deg)":"rotateY(0deg)"};

  const firstName=selected?.label.split(" ").slice(2).join(" ");

  const e=React.createElement;

  return e("div",null,
    e("div",{style:{textAlign:"center",marginBottom:"1.75rem"}},
      e("p",{style:{fontSize:11,color:"var(--color-text-tertiary)",letterSpacing:2,textTransform:"uppercase",marginBottom:6}},"ESPAM MFL · examen"),
      e("h1",{style:{fontSize:22,fontWeight:500,margin:"0 0 4px"}},"Elige tu horario"),
      e("p",{style:{fontSize:14,color:"var(--color-text-secondary)",margin:0}},"Lanza la moneda para votar por el horario del examen")
    ),

    e("div",{className:"coin-scene"},
      e("div",{key:flipKey,className:coinCls,style:coinSt},
        e("div",{className:"coin-face"},
          e("i",{className:"ti ti-sun","aria-hidden":"true",style:{fontSize:30,color:"#BA7517"}}),
          e("div",{style:{fontSize:12,fontWeight:500,color:"#633806",textAlign:"center",lineHeight:1.4}},"10:00 – 11:00",e("br"),"A.M.")
        ),
        e("div",{className:"coin-back"},
          e("i",{className:"ti ti-moon","aria-hidden":"true",style:{fontSize:30,color:"#BA7517"}}),
          e("div",{style:{fontSize:12,fontWeight:500,color:"#633806",textAlign:"center",lineHeight:1.4}},"4:00 – 5:00",e("br"),"P.M.")
        )
      )
    ),

    e("div",{style:{background:"var(--color-background-primary)",border:"0.5px solid var(--color-border-tertiary)",borderRadius:"var(--border-radius-lg)",padding:"1.25rem"}},
      loading?e("p",{style:{textAlign:"center",color:"var(--color-text-secondary)",fontSize:14}},"Cargando..."):
      e("div",null,

        phase==="type"&&e("div",null,
          e("label",{style:{fontSize:12,color:"var(--color-text-secondary)",textTransform:"uppercase",letterSpacing:1,display:"block",marginBottom:8}},"Escriba sus apellidos y nombres"),
          e("input",{ref:inputRef,className:"ni",type:"text",placeholder:"Ej: Zambrano Giler Juleysy Jamileth",value:typed,
            onChange:ev=>setTyped(ev.target.value),
            onKeyDown:ev=>{if(ev.key==="Enter")handleVerify();}
          }),
          e("p",{style:{fontSize:12,color:"var(--color-text-tertiary)",margin:"8px 0 14px"}},"Ingrese sus apellidos seguidos de sus nombres, tal como aparecen en el registro."),
          e("div",{style:{textAlign:"center"}},
            e("button",{className:"fb",onClick:handleVerify,disabled:typed.trim().length<4,style:{opacity:typed.trim().length<4?.5:1}},"Verificar")
          )
        ),

        phase==="notfound"&&e("div",null,
          e("div",{style:{padding:"12px 14px",background:"var(--color-background-danger)",border:"0.5px solid var(--color-border-danger)",borderRadius:"var(--border-radius-md)",marginBottom:14}},
            e("div",{style:{fontSize:13,fontWeight:500,color:"var(--color-text-danger)",marginBottom:2}},
              e("i",{className:"ti ti-x","aria-hidden":"true",style:{marginRight:6}}),"No encontrado"
            ),
            e("div",{style:{fontSize:12,color:"var(--color-text-secondary)"}},"No se encontró ese nombre en el registro. Verifique la ortografía e intente de nuevo.")
          ),
          e("div",{style:{textAlign:"center"}},e("button",{className:"sb",onClick:()=>{setPhase("type");}},"Intentar de nuevo"))
        ),

        phase==="ambiguous"&&e("div",null,
          e("p",{style:{fontSize:13,color:"var(--color-text-secondary)",marginBottom:12}},"Se encontraron varios resultados. ¿Cuál es usted?"),
          matches.map(s=>e("div",{key:s.id,
            style:{padding:"10px 14px",border:"0.5px solid var(--color-border-secondary)",borderRadius:"var(--border-radius-md)",marginBottom:8,cursor:"pointer",fontSize:14},
            onClick:()=>confirmStudent(s)
          },s.label))
        ),

        phase==="confirm"&&selected&&e("div",{style:{textAlign:"center"}},
          e("p",{style:{fontSize:14,color:"var(--color-text-secondary)",marginBottom:6}},"¿Es usted?"),
          e("p",{style:{fontSize:17,fontWeight:500,marginBottom:20}},selected.label),
          e("div",{style:{display:"flex",gap:10,justifyContent:"center"}},
            e("button",{className:"sb",onClick:()=>{setPhase("type");setTyped("");setSelected(null);}},"No soy yo"),
            e("button",{className:"fb",onClick:()=>setPhase("ready")},"Sí, soy yo")
          )
        ),

        phase==="ready"&&e("div",{style:{textAlign:"center"}},
          e("p",{style:{fontSize:13,color:"var(--color-text-secondary)",marginBottom:14}},
            "Bienvenido/a, ",e("strong",{style:{fontWeight:500,color:"var(--color-text-primary)"}},firstName),". ¡Es su turno!"
          ),
          e("button",{className:"fb",onClick:doFlip},
            e("i",{className:"ti ti-coin","aria-hidden":"true",style:{marginRight:8,verticalAlign:-2}}),
            "Lanzar moneda"
          )
        ),

        phase==="flipping"&&e("div",{style:{textAlign:"center",color:"var(--color-text-secondary)",fontSize:14}},"Lanzando..."),

        phase==="done"&&e("div",{style:{textAlign:"center"}},
          e("div",{style:{fontSize:18,fontWeight:500,marginBottom:4}},result==="A"?"10:00 – 11:00 A.M.":"4:00 – 5:00 P.M."),
          e("div",{style:{fontSize:12,color:"var(--color-text-success)"}},
            e("i",{className:"ti ti-check","aria-hidden":"true",style:{marginRight:4}}),"Voto registrado"
          )
        ),

        phase==="already"&&e("div",{style:{padding:"12px 14px",background:"var(--color-background-success)",border:"0.5px solid var(--color-border-success)",borderRadius:"var(--border-radius-md)"}},
          e("div",{style:{fontSize:13,fontWeight:500,color:"var(--color-text-success)",marginBottom:2}},
            e("i",{className:"ti ti-check","aria-hidden":"true",style:{marginRight:6}}),"Ya votó"
          ),
          e("div",{style:{fontSize:12,color:"var(--color-text-secondary)"}},"Su voto: ",result==="A"?"10:00 – 11:00 A.M.":"4:00 – 5:00 P.M.")
        ),

        total>0&&e("div",{style:{borderTop:"0.5px solid var(--color-border-tertiary)",paddingTop:"1rem",marginTop:"1rem"}},
          e("p",{style:{fontSize:11,color:"var(--color-text-tertiary)",textTransform:"uppercase",letterSpacing:1,margin:"0 0 14px",textAlign:"center"}},"Resultados · "+total+" de "+ROSTER.length+" votos"),
          [{key:"A",label:"10:00 – 11:00 A.M.",count:tally.A,pct:pctA,color:"#378ADD"},
           {key:"B",label:"4:00 – 5:00 P.M.",count:tally.B,pct:pctB,color:"#D85A30"}
          ].map(opt=>e("div",{key:opt.key,style:{marginBottom:12}},
            e("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:6,fontSize:13}},
              e("span",{style:{color:"var(--color-text-primary)"}},opt.label),
              e("span",{style:{color:"var(--color-text-secondary)"}},opt.count+" voto"+(opt.count!==1?"s":"")+" · "+opt.pct+"%")
            ),
            e("div",{className:"pt"},e("div",{className:"pf",style:{width:opt.pct+"%",background:opt.color}}))
          ))
        )
      )
    ),
    e("p",{style:{textAlign:"center",marginTop:"1rem",fontSize:11,color:"var(--color-text-tertiary)"}},"Cada estudiante puede votar una sola vez")
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
